<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Events - Thiruppugazh Anbargal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-top: 1.5rem;
    }
    .event-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border-top: 5px solid var(--primary-color);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }
    .event-card:hover {
      transform: translateY(-5px);
    }
    .event-card-content {
      padding: 1.5rem;
      flex: 1;
    }
    .event-card h3 {
      color: var(--primary-color);
      margin-top: 0;
      font-size: 1.4rem;
    }
    .event-details {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .event-details div {
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-join {
      background-color: var(--primary-color);
      color: white;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .btn-media {
      background-color: #2ecc71;
      color: white;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .loading-spinner {
      text-align: center;
      padding: 4rem;
      font-size: 1.2rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="container mt-2 mb-4">
    <div class="card">
      <h1 class="text-center" style="color: var(--primary-color);">Upcoming Guruji Thiruppugazh Events</h1>
      <p class="text-center text-muted" style="max-width: 800px; margin: 0 auto;">Join our community in these upcoming spiritual gatherings, bhajan sessions, and celebrations centered around Guruji's teachings.</p>
      
      <div id="upcoming-events-list">
        <div class="loading-spinner">✨ Loading upcoming events...</div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const listEl = document.getElementById('upcoming-events-list');
      
      // Initialize Firebase if needed
      if (!firebase.apps.length) {
        firebase.initializeApp(globalFirebaseConfig);
      }
      const db = firebase.firestore();

      try {
        const snapshot = await db.collection("admin_events")
          .orderBy("eventDateTime", "asc")
          .get();

        if (snapshot.empty) {
          listEl.innerHTML = `
            <div style="text-align: center; padding: 4rem;">
              <p style="font-size: 1.2rem; margin-bottom: 2rem;">No upcoming events scheduled at the moment.</p>
              <img src="images/banner1.png" style="max-height: 150px; opacity: 0.5; filter: grayscale(1);" alt="No events">
            </div>`;
          return;
        }

        let html = '<div class="events-grid">';
        snapshot.forEach(doc => {
          const data = doc.data();
          const eventDate = data.eventDateTime ? new Date(data.eventDateTime) : null;
          
          html += `
            <div class="event-card">
              <div class="event-card-content">
                <h3>${data.eventName}</h3>
                <div class="event-details">
                  <div>📅 ${eventDate ? eventDate.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : 'To Be Announced'}</div>
                  <div>🕒 ${eventDate ? eventDate.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : ''}</div>
                  <div>📍 ${data.venue}, ${data.city}</div>
                </div>
                ${data.bhajan ? `<p style="font-style: italic; color: var(--primary-color); border-top: 1px solid #eee; padding-top: 10px;">${data.bhajan}</p>` : ''}
                <div class="event-links" style="margin-top: 20px;">
                  ${data.urlToJoin ? `<a href="${data.urlToJoin}" target="_blank" class="btn-join">Join Event</a>` : ''}
                  ${data.mediaUrl ? `<a href="${data.mediaUrl}" target="_blank" class="btn-media">Photos / Videos</a>` : ''}
                </div>
              </div>
            </div>
          `;
        });
        html += '</div>';
        listEl.innerHTML = html;
      } catch (error) {
        console.error("Error fetching events:", error);
        listEl.innerHTML = '<p class="text-center" style="color:red; padding: 2rem;">Error loading events. Please try again later.</p>';
      }
    });
  </script>
</body>
</html>
