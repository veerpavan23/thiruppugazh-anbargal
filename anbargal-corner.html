<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiruppugazh Anbargal - Anbargal Corner</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .bhajans { width: 100%; height: 315px; max-width: 560px; margin-bottom: 20px; }
  </style>
  <!-- Firebase v8 from CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">Anbargal Corner</h2>
      
      <h4 class="mb-1" style="border-bottom: 2px solid var(--primary-color);">Chitra Murthy Books</h4>
      <div id="chitra-murthy-list" class="mt-1" style="margin-bottom: 25px;">
        <div class="loader-container">
          <div class="loader"></div>
        </div>
      </div>
      
      <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBZj1DcjriYkzGsu6su5mgVdzFD0yC4-r8",
          projectId: "thiruppugazhanbargal-515e8",
          storageBucket: "thiruppugazhanbargal-515e8.appspot.com",
        };
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const storage = firebase.storage();

        async function loadBooksFromFolder(folderName, containerId) {
          const container = document.getElementById(containerId);
          try {
            const listRef = storage.ref(folderName);
            const res = await listRef.listAll();
            
            if (res.items.length === 0) {
              container.innerHTML = `<p>No books found in '${folderName}' folder.</p>`;
              return;
            }

            const fileData = await Promise.all(res.items.map(async (item) => {
              const url = await item.getDownloadURL();
              return { name: item.name, url };
            }));

            fileData.sort((a, b) => a.name.localeCompare(b.name));
            
            container.innerHTML = `<ul>
              ${fileData.map(p => `
                <li style="margin-bottom: 8px; font-size: 1.1em;">
                  <a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>
                </li>
              `).join('')}
            </ul>`;
          } catch (e) {
            console.error(`Error listing ${folderName} folder`, e);
            container.innerHTML = "<p style='color:red;'>Error loading books. Please check Firebase Storage.</p>";
          }
        }

        document.addEventListener("DOMContentLoaded", () => {
          loadBooksFromFolder('chitra-murthy-books', 'chitra-murthy-list');
          loadBooksFromFolder('ThiruchendurChitrasabhai', 'thiruchendur-books-list');
        });
      </script>
      
      <h4 class="mb-1" id="uma-balasubramanian-books" style="border-bottom: 2px solid var(--primary-color);">Uma Balasubramanian Books</h4>
      <p style="margin-bottom:20px;"><img src="images/anbargal-corner/uma-book.png" alt="Uma Balasubramanian Books" style="max-width:300px; display:block; margin: 0 auto;"></p>
      
      <div id="youtube-links">
        <h4 class="mb-1" style="border-bottom: 2px solid var(--primary-color);">Youtube Links</h4>
        <div class="grid grid-2" style="gap:20px; align-items:center; margin-bottom: 30px;">
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PLoAWWQG2advarvEia1rEJoO_GJj2ruREZ&si=-ZEmcjrrQrxaabK3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PLoAWWQG2advah1Xzu4VCXp5-Xkgvzpgi_" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PLoAWWQG2advaVKPb3BJsYw-Y9_rDT1GCK" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PL4MQY3mWzSNRmzHnFkhFdrK56hzfh_HwL&si=9zV5KUy8eZugUhgj" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PL4MQY3mWzSNTJA55lHEBl6f-2AK8hLOeV&si=ceVFsaHz9E0LBhRE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
 
          <iframe class="bhajans" src="https://www.youtube.com/embed/playlist?list=PLn0nf_1Gv2f7N9epP_ci1sqhjNkbPd8a8&si=wEuzxwJttqotHCIt" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>

      <h4 class="mb-1" style="border-bottom: 2px solid var(--primary-color);">Padma Subramanian - Kandar anubhuti with meaning</h4>
      <div style="margin-top: 15px; text-align:left; margin-bottom: 30px;">
        <ul style="margin-left: 20px;">
          <li style="margin-bottom: 8px; font-size: 1.1em;">
            <a href="https://drive.google.com/drive/folders/1DKrD4-0G52sddqojebfqi4Cb-62a-VxV?usp=sharing" target="_blank" rel="noreferrer" style="font-weight:bold; color: var(--primary-color);">
              Padma Subramanian - Kandar anubhuti with meaning

          </li>
        </ul>
      </div>

      <h4 class="mb-1" style="border-bottom: 2px solid var(--primary-color);">Thiruchendur Chitra sabhai Books</h4>
      <div id="thiruchendur-books-list" class="mt-1" style="margin-bottom: 25px;">
        <div class="loader-container">
          <div class="loader"></div>
        </div>
      </div>
      
    </div>
  </main>
  <script src="js/layout.js"></script>
</body>
</html>
