<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vel Mayil Virutham - Thiruppugazh Anbargal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .audio-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary-color); transition: transform 0.2s; }
    .audio-card:hover { transform: translateY(-3px); }
    .audio-card h3 { margin-bottom: 10px; color: var(--primary-color); font-size: 1.1rem; }

  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">Vel Mayil Virutham</h2>
      
      <div id="audio-list" class="grid grid-2">
        <div class="loader-container" style="grid-column: 1/-1;">
          <div class="loader"></div>
        </div>
      </div>


    </div>
  </main>

  <script src="js/layout.js"></script>
  <script>
    async function loadAudioRecs() {
      const container = document.getElementById('audio-list');
      try {
        const storage = firebase.storage();
        const ref = storage.ref("vel-mayil-virutham");
        const res = await ref.list();
        
        if (res.items.length === 0) {
          container.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">No audio recordings found in this category.</p>';
          return;
        }

        const list = await Promise.all(res.items.map(async (item) => {
          const url = await item.getDownloadURL();
          let name = item.name.replace('.mp3', '').replace('.mpeg', '');
          let number = parseInt(name.split('.')[0]) || 0;
          return { name, url, number };
        }));

        list.sort((a, b) => a.number - b.number);

        container.innerHTML = list.map(item => `
          <div class="audio-card">
            <h3>${item.name}</h3>
            <audio controls style="width: 100%;">
              <source src="${item.url}" type="audio/mpeg">
              Your browser does not support the audio element.
            </audio>
          </div>
        `).join('');
      } catch (err) {
        console.error("Storage Error:", err);
        container.innerHTML = '<p class="text-center" style="grid-column: 1/-1; color: red;">Error loading recordings. Please check your internet connection.</p>';
      }
    }
    document.addEventListener('DOMContentLoaded', loadAudioRecs);
  </script>
</body>
</html>
