<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Thiruppugazh Anbargal</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <main class="container">
    <div class="admin-container" style="max-width: 400px; margin: 4rem auto;">
      <h1 class="text-center" style="margin-bottom: 2rem;">Administrator Sign In</h1>
      
      <div id="auth-view" class="auth-form">
        <div id="auth-error" style="color: red; margin-bottom: 1rem; text-align:center; display: none;"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="admin@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" id="login-btn" class="btn" style="width: 100%;">Sign In</button>
        </form>
      </div>
      
      <p class="text-center mt-2">
        <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">← Back to Public Website</a>
      </p>
    </div>
  </main>

  <script src="js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.auth || firebase.auth();
      const loginForm = document.getElementById('login-form');
      const authError = document.getElementById('auth-error');
      const loginBtn = document.getElementById('login-btn');

      // If user is already logged in, redirect to admin.html
      auth.onAuthStateChanged(user => {
        if (user) {
          window.location.href = 'admin.html';
        }
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing In...';
        authError.style.display = 'none';

        try {
          await auth.signInWithEmailAndPassword(email, password);
          // Redirect on successful login (onAuthStateChanged will handle it)
        } catch (error) {
          authError.textContent = "Invalid username or password. Please try again.";
          authError.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
