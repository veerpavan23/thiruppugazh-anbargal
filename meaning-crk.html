<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiruppugazh Anbargal - CRK Meanings</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .list-container {
      margin-bottom: 25px;
    }

    .list-container li {
      margin-bottom: 8px;
      font-size: 1.1em;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>

<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">All Songs With Meaning By CRK</h2>

      <div class="list-container">
        <ul id="crk-meanings-list">
          <div class="loader-container">
            <div class="loader"></div>
          </div>
        </ul>
      </div>
    </div>
  </main>

  <script src="js/layout.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBZj1DcjriYkzGsu6su5mgVdzFD0yC4-r8",
      authDomain: "thiruppugazhanbargal-515e8.firebaseapp.com",
      projectId: "thiruppugazhanbargal-515e8",
      storageBucket: "thiruppugazhanbargal-515e8.appspot.com",
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const storage = firebase.storage();

    async function loadCRKMeanings() {
      const listElement = document.getElementById('crk-meanings-list');
      try {
        const crkRef = storage.ref("meaning-crk");
        // Using listAll() to ensure all files are fetched dynamically
        const crkRes = await crkRef.listAll();

        if (crkRes.items.length === 0) {
          listElement.innerHTML = "<li>No meanings found in the 'pdf' folder.</li>";
          return;
        }

        let crks = await Promise.all(crkRes.items.map(async (item) => {
          const url = await item.getDownloadURL();
          // Extract the first number from names like "Songs1-4..." or "Songs5-52..."
          const match = item.name.match(/\d+/);
          return {
            name: item.name,
            url,
            sortNum: match ? parseInt(match[0]) : 999
          };
        }));

        // Sort numerically by the first number found in the filename
        crks.sort((a, b) => a.sortNum - b.sortNum || a.name.localeCompare(b.name));

        listElement.innerHTML = crks.map(p => `
          <li>
            <a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>
          </li>
        `).join('');
      } catch (err) {
        console.error("Firebase Storage Error: ", err);
        listElement.innerHTML = "<li style='color: red;'>Error loading from Firebase. Check your connection.</li>";
      }
    }

    document.addEventListener('DOMContentLoaded', loadCRKMeanings);
  </script>
</body>

</html>
