<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Tamil Meaning URLs - Admin Utility</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .utility-card {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      border-radius: 12px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    .status-list {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 10px;
      border-radius: 6px;
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      background: #f9f9f9;
    }
    .status-item {
      margin-bottom: 4px;
    }
    .status-success { color: green; font-weight: bold; }
    .status-error { color: red; font-weight: bold; }
    .btn-action {
      background-color: var(--primary-color);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 1rem;
      margin-top: 1rem;
      transition: background-color 0.2s;
    }
    .btn-action:hover {
      filter: brightness(0.95);
    }
    .btn-action:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 1rem;
    }
    .form-row .form-group {
      flex: 1;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body style="background: var(--bg-color);">
  <main class="container">
    <div class="utility-card">
      <h2 class="text-center" style="color: var(--primary-color); margin-bottom: 1rem;">Firestore URL Updater</h2>
      <p class="text-muted text-center" style="margin-bottom: 2rem;">Update Tamil Meaning URLs for a range of song documents in the Firestore database.</p>

      <!-- Auth Section -->
      <div id="auth-section">
        <h3>Admin Login Required</h3>
        <p style="font-size: 0.9rem; margin-bottom: 1rem;">Please enter your admin credentials to authorize database writes.</p>
        <div id="auth-error" style="color: red; margin-bottom: 1rem; display: none;"></div>
        <form id="login-form">
          <div class="form-group" style="margin-bottom: 1rem;">
            <label for="email">Admin Email</label>
            <input type="email" id="email" class="form-control" required placeholder="admin@example.com">
          </div>
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn-action">Sign In</button>
        </form>
      </div>

      <!-- Action Section -->
      <div id="action-section" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <span id="logged-in-user" style="font-weight: bold; font-size: 0.9rem;">Logged in as: -</span>
          <button id="sign-out-btn" class="btn btn-secondary btn-small">Sign Out</button>
        </div>

        <form id="update-form">
          <div class="form-row">
            <div class="form-group">
              <label for="start-id">Start Song ID</label>
              <input type="number" id="start-id" class="form-control" required value="57">
            </div>
            <div class="form-group">
              <label for="end-id">End Song ID</label>
              <input type="number" id="end-id" class="form-control" required value="92">
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label for="target-url">Target Storage URL (gs://...)</label>
            <input type="text" id="target-url" class="form-control" required value="gs://thiruppugazhanbargal-515e8.appspot.com/meanings/2.57-92 Palani.pdf" placeholder="gs://...">
          </div>
          <button type="submit" id="start-update-btn" class="btn-action">Run Batch Update</button>
        </form>
        
        <div id="progress-container" style="display: none; margin-top: 1.5rem;">
          <h4 id="progress-status">Progress: 0 / 0 updated</h4>
          <div class="status-list" id="status-log"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/layout.js"></script>
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp(globalFirebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    const authSection = document.getElementById('auth-section');
    const actionSection = document.getElementById('action-section');
    const loginForm = document.getElementById('login-form');
    const authError = document.getElementById('auth-error');
    const loggedInUserText = document.getElementById('logged-in-user');
    const signOutBtn = document.getElementById('sign-out-btn');
    const updateForm = document.getElementById('update-form');
    const startUpdateBtn = document.getElementById('start-update-btn');
    const progressContainer = document.getElementById('progress-container');
    const progressStatus = document.getElementById('progress-status');
    const statusLog = document.getElementById('status-log');

    // Monitor Auth State
    auth.onAuthStateChanged(user => {
      if (user) {
        authSection.style.display = 'none';
        actionSection.style.display = 'block';
        loggedInUserText.textContent = `Logged in as: ${user.email}`;
      } else {
        authSection.style.display = 'block';
        actionSection.style.display = 'none';
      }
    });

    // Handle Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      authError.style.display = 'none';

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (err) {
        console.error(err);
        authError.textContent = err.message;
        authError.style.display = 'block';
      }
    });

    // Handle Sign Out
    signOutBtn.addEventListener('click', () => {
      auth.signOut();
    });

    // Handle Update Execution
    updateForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const startVal = parseInt(document.getElementById('start-id').value);
      const endVal = parseInt(document.getElementById('end-id').value);
      const targetUrl = document.getElementById('target-url').value.trim();

      if (isNaN(startVal) || isNaN(endVal) || startVal > endVal) {
        alert('Please enter valid Start and End Song IDs where Start <= End.');
        return;
      }

      if (!targetUrl.startsWith('gs://')) {
        alert('Warning: The target URL does not start with gs://. Please make sure this is correct.');
      }

      const totalDocs = endVal - startVal + 1;
      if (!confirm(`Are you sure you want to update songs ${startVal} to ${endVal} to:\n${targetUrl}?`)) {
        return;
      }
      
      startUpdateBtn.disabled = true;
      progressContainer.style.display = 'block';
      statusLog.innerHTML = '';
      
      let successCount = 0;
      let errorCount = 0;

      for (let i = startVal; i <= endVal; i++) {
        const docId = String(i);
        const logItem = document.createElement('div');
        logItem.className = 'status-item';
        logItem.textContent = `Updating song ${docId}... `;
        statusLog.appendChild(logItem);
        statusLog.scrollTop = statusLog.scrollHeight;

        try {
          const docRef = db.collection("songs").doc(docId);
          await docRef.update({
            tamilMeaningUrl: targetUrl
          });
          logItem.innerHTML += '<span class="status-success">✔ Success</span>';
          successCount++;
        } catch (err) {
          console.error(`Error updating document ${docId}:`, err);
          logItem.innerHTML += `<span class="status-error">✘ Error: ${err.message}</span>`;
          errorCount++;
        }

        progressStatus.textContent = `Progress: ${successCount + errorCount} / ${totalDocs} updated (${successCount} Succeeded, ${errorCount} Failed)`;
      }

      const summaryLog = document.createElement('div');
      summaryLog.style.fontWeight = 'bold';
      summaryLog.style.marginTop = '10px';
      summaryLog.textContent = `Update complete! ${successCount} documents updated successfully, ${errorCount} failed.`;
      statusLog.appendChild(summaryLog);
      statusLog.scrollTop = statusLog.scrollHeight;
      
      startUpdateBtn.disabled = false;
    });
  </script>
</body>
</html>
