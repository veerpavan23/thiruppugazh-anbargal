<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valli Kalyanam - Thiruppugazh Anbargal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .audio-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary-color); }
    .audio-card h3 { margin-bottom: 10px; color: var(--primary-color); font-size: 1.1rem; text-transform: capitalize; }
    .pdf-link { display: inline-block; padding: 10px 20px; background: #007bff; color: white !important; border-radius: 4px; text-decoration: none !important; margin-top: 20px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">Valli Kalyanam</h2>
      <div id="audio-list" class="grid grid-2">
        <div class="loader-container" style="grid-column: 1/-1;">
          <div class="loader"></div>
        </div>
      </div>
      <div class="text-center mt-3" id="pdf-container">
        <!-- PDF Link will be added here -->
      </div>
    </div>
  </main>
  <script src="js/layout.js"></script>
  <script>
    async function loadContent() {
      const container = document.getElementById('audio-list');
      const pdfContainer = document.getElementById('pdf-container');
      try {
        const storage = firebase.storage();
        
        // Load Audio
        const audioRef = storage.ref("valli-kalyanam");
        const audioRes = await audioRef.list();
        if (audioRes.items.length > 0) {
          const nameMap = {
            "01GajananamViruthamNattai": "1.Gajananam Virutham-Nattai",
            "03AnthamViruthamSaveri": "2.Antham Virutham-Saveri",
            "04ThiruvadiyumViruthamMohanamMurthiSir": "3.Thiruvadiyum Virutham-Mohanam",
            "05SenKelViruthamDarbariKanadaManiSir": "4.SenKel Virutham-Darbari Kanada",
            "06AmararSigamaniyeViruthamHamsananthiRamaniSir": "5.Amarar Sigamaniye Virutham-Hamsananthi",
            "07VallikkuSivaranjani": "6.Vallikku-Sivaranjani",
            "08VelMurugaManolayam": "7.Vel Muruga-Manolayam",
            "09ArimugamMuruganAluthariyaArumugamum": "8.Arimugam Murugan",
            "10MalaiMatralThilang": "9.MalaiMatral-Thilang",
            "11MalaiMatral": "10.Malai Matral",
            "12UnjalAduthal": "11.Unjal Aduthal",
            "13Kannunjal": "12.Kannunjal",
            "14VelMurugaVelan": "13.Vel Muruga Velan",
            "15ValliKalyanaVaibogame": "14.Valli Kalyana Vaibogame",
            "16Pravaram": "15.Pravaram",
            "17Pravaram": "16.Pravaram",
            "18Manthiram": "17.Manthiram",
            "19Manamenum": "18.Manamenum",
            "20PumathudaneeAni": "19.PumathudaneeAni",
            "21MurugaNamavali": "20.MurugaNamavali",
            "22GurujiSpeaks": "21.Guruji Speaks",
            "23Mangalyatharanam": "22.Mangalyatharanam",
            "24PerumViruthamHindolam": "23.Perum Virutham-Hindolam",
            "25Puraipadum": "24.Puraipadum",
            "26Olamaraikal": "25.Olamaraikal",
            "27JayaJaya": "26.JayaJaya",
            "28Pangayanaar": "27.Pangayanaar",
            "29PangayaContd": "28.Pangayanar Contd",
            "30AvagunaViraganai": "29.Avaguna Viraganai",
            "31AlliVizhiyaalum": "30.AlliVizhiyaalum",
            "32AgaramuMaakiPurvikalyani": "31.Agaramu Maaki-Purvikalyani",
            "33SollukakkuViruthamBrinthavanaSarangaSaravanabava": "32.Sollukakku Virutham-BrinthavanaSaranga,Saravanabava",
            "34VazhthuSinduBhairavi": "33.Vazhthu-SinduBhairavi",
            "36Archanai 108": "34.Archanai 108",
            "36Archanai108": "34.Archanai 108",
            "37Ashtothiram": "35.Ashtothiram",
            "38ThevaramThunsalil": "36.ThevaramThunsalil",
            "39KummiThirumagal": "37.Kummi Thirumagal",
            "40KolattamAlaiKadal": "38.Kolattam Alai Kadal",
            "41Athlasedanarada": "39.Athlasedanararada",
            "42Manthirangal": "40.Manthirangal",
            "43ErumayilMadyamavathi": "41.Erumayil-Madyamavathi",
            "44ArulRepeatVersion": "42.Arul-Repeat Version"
          };
          const audioList = await Promise.all(audioRes.items.map(async (item) => {
            const url = await item.getDownloadURL();
            let rawName = item.name.split('.')[0].replace(/_/g, " ");
            let name = nameMap[rawName] || nameMap[rawName.replace(/ /g, "")] || rawName;
            return { name, url };
          }));
          container.innerHTML = audioList.map(item => `
            <div class="audio-card">
              <h3>${item.name}</h3>
              <audio controls style="width: 100%;">
                <source src="${item.url}" type="audio/mpeg">
              </audio>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">No audio recordings found.</p>';
        }

        // Load PDF
        const pdfRef = storage.ref("resources/valli-kalyanam");
        const pdfRes = await pdfRef.list();
        if (pdfRes.items.length > 0) {
          const pdfItem = pdfRes.items[0];
          const pdfUrl = await pdfItem.getDownloadURL();
          pdfContainer.innerHTML = `<a href="${pdfUrl}" target="_blank" class="pdf-link">Download Valli Kalyanam Book (PDF)</a>`;
        }
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="text-center" style="grid-column: 1/-1; color: red;">Error loading content.</p>';
      }
    }
    document.addEventListener('DOMContentLoaded', loadContent);
  </script>
</body>
</html>
