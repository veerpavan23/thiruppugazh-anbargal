<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiruppugazh Anbargal - NR Meanings</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .list-container { margin-bottom: 25px; }
    .list-container li { margin-bottom: 8px; font-size: 1.1em; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">All Songs With Meaning By NR</h2>
      
      <div class="list-container">
        <ul id="nr-meanings-list">
          <li>Loading from Firebase...</li>
        </ul>
      </div>
    </div>
  </main>
  
  <script src="js/layout.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBZj1DcjriYkzGsu6su5mgVdzFD0yC4-r8",
      authDomain: "thiruppugazhanbargal-515e8.firebaseapp.com",
      projectId: "thiruppugazhanbargal-515e8",
      storageBucket: "thiruppugazhanbargal-515e8.appspot.com",
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const storage = firebase.storage();

    async function loadNRMeanings() {
      try {
        const meaningsRef = storage.ref("meanings");
        const meaningsRes = await meaningsRef.list();
        let meanings = await Promise.all(meaningsRes.items.map(async (item) => {
          const url = await item.getDownloadURL();
          return { name: item.name, url };
        }));

        meanings.sort((a, b) => {
          let n1 = +a.name.split('.')[0];
          let n2 = +b.name.split('.')[0];
          return n1 - n2;
        });

        document.getElementById('nr-meanings-list').innerHTML = meanings.map(p => `<li><a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a></li>`).join('');
      } catch (err) {
        console.error("Firebase Storage Error: ", err);
        document.getElementById('nr-meanings-list').innerHTML = "<li>Error loading from Firebase</li>";
      }
    }

    document.addEventListener('DOMContentLoaded', loadNRMeanings);
  </script>
</body>
</html>
