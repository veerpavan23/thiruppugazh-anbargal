<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiruppugazh Anbargal - Guru Anjali</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <!-- Firebase v8 from CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <main class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-2">Guru Anjali</h2>
      
      <div id="pdf-list" style="display:flex; flex-direction:column; gap:15px; font-size: 1.1em; align-items: flex-start; justify-content: flex-start;">
        <div class="loader-container">
          <div class="loader"></div>
        </div>
      </div>

    </div>
  </main>
  <script src="js/layout.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBZj1DcjriYkzGsu6su5mgVdzFD0yC4-r8",
      projectId: "thiruppugazhanbargal-515e8",
      storageBucket: "thiruppugazhanbargal-515e8.appspot.com",
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const storage = firebase.storage();

    async function loadPdfs() {
      const container = document.getElementById("pdf-list");
      
      try {
        const listRef = storage.ref('GuruAnjali');
        const res = await listRef.listAll();
        
        if (res.items.length === 0) {
          container.innerHTML = "<p>No files found in GuruAnjali folder.</p>";
          return;
        }

        // Fetch all download URLs and file metadata
        const fileData = await Promise.all(res.items.map(async (item) => {
          const url = await item.getDownloadURL();
          return { name: item.name, url };
        }));

        // Sort items by name
        fileData.sort((a, b) => a.name.localeCompare(b.name));
        
        container.innerHTML = `<ul>
          ${fileData.map(p => `
            <li>
              <a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a>
            </li>
          `).join('')}
        </ul>`;
      } catch (e) {
        console.error("Error listing GuruAnjali folder", e);
        container.innerHTML = "<p style='color:red;'>Error loading files. Please check Firebase Storage rules and ensure 'GuruAnjali' folder exists.</p>";
      }
    }
    document.addEventListener("DOMContentLoaded", loadPdfs);
  </script>
</body>
</html>
